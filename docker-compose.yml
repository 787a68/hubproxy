services:
  hubproxy:
    image: ghcr.io/787a68/hubproxy:latest
    container_name: hubproxy
    restart: always
    ports:
      - "5000:5000"
    environment:
      - CONFIG_PATH=/etc/hubproxy/config.toml
    volumes:
      - ./src/config.toml:/etc/hubproxy/config.toml:ro
      - hubproxy-data:/etc/hubproxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "2"

volumes:
  hubproxy-data:
