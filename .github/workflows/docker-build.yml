name: docker

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@latest

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@latest

      - name: 登录 GHCR
        uses: docker/login-action@latest
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 计算版本号
        id: version
        run: |
          VERSION="$(date -u +%Y.%m.%d)"
          echo "ver=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 构建并推送 ${{ matrix.arch }}
        uses: docker/build-push-action@latest
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.arch }}-${{ steps.version.outputs.ver }}
          labels: |
            org.opencontainers.image.title=HubProxy
            org.opencontainers.image.version=${{ steps.version.outputs.ver }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            VERSION=${{ steps.version.outputs.ver }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: 登录 GHCR
        uses: docker/login-action@latest
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 计算版本号
        id: version
        run: |
          VERSION="$(date -u +%Y.%m.%d)"
          echo "ver=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 创建多架构 manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VER="${{ steps.version.outputs.ver }}"

          # latest → 自动识别架构
          docker buildx imagetools create -t "$IMAGE:latest" \
            "$IMAGE:amd64-$VER" "$IMAGE:arm64-$VER"

          # 日期版本 → 自动识别架构
          docker buildx imagetools create -t "$IMAGE:$VER" \
            "$IMAGE:amd64-$VER" "$IMAGE:arm64-$VER"

          # arm64 → 最新 ARM64
          docker buildx imagetools create -t "$IMAGE:arm64" \
            "$IMAGE:arm64-$VER"
